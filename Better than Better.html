<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DABEST.Engine</title>
  <style>
    :root { --neon: #00ff41; --bg: #010201; --panel: #0a0f0a; --accent: #00ff9d; --err: #ff4444; }
    body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 95%; max-width: 850px; }
    .card { background: var(--panel); border: 1px solid #1e4a1e; border-radius: 12px; padding: 30px; box-shadow: 0 0 30px rgba(0,255,65,0.05); margin-bottom: 20px; text-align: center; }
    .header { font-size: 2.2rem; letter-spacing: 6px; margin-bottom: 5px; font-weight: 900; text-transform: uppercase; }
    #dynamic-desc { color: var(--accent); font-size: 0.9rem; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; min-height: 1.5em; text-transform: uppercase; }
    input { background: #000; border: 1px solid #1e4a1e; color: var(--neon); padding: 18px; width: calc(100% - 38px); border-radius: 8px; margin-bottom: 20px; font-size: 1.1rem; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,157,0.1); }
    button { background: var(--neon); color: #000; border: none; padding: 16px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 8px; text-transform: uppercase; transition: 0.2s; }
    button:hover { filter: brightness(1.2); transform: translateY(-2px); }
    #ai-analysis { background: rgba(0, 255, 157, 0.07); border: 1px solid var(--accent); padding: 25px; border-radius: 10px; margin-top: 25px; display: none; color: #fff; line-height: 1.6; text-align: left; border-left: 4px solid var(--accent); }
    .result-item { background: rgba(255,255,255,0.02); margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 2px solid var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <div class="header">INTER<span style="color:#fff">SEARCH</span></div>
  <div id="dynamic-desc">GROQ-POWERED SEARCH ENGINE</div>

  <div class="card">
    <input id="searchQuery" placeholder="Search" onkeypress="if(event.key==='Enter') executeNeuralCrawl()">
    <button onclick="executeNeuralCrawl()">Start Crawl</button>
    <div id="ai-analysis"></div>
  </div>
  <div id="results"></div>
</div>

<script>
  const TAVILY_KEY = "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"; 
  const SERPER_KEYS = [
    "fdce127b147d060091a73cfae7d31504662f0764", 
    "d4eb67dfedfa96456d3a1db512b423b85690e247"
  ];
  const GROQ_KEY = "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";

  function updateStatus(msg, isError = false) {
    const el = document.getElementById('dynamic-desc');
    el.style.color = isError ? "var(--err)" : "var(--accent)";
    el.innerHTML = msg;
  }

  async function executeNeuralCrawl() {
    const query = document.getElementById('searchQuery').value;
    const aiBox = document.getElementById('ai-analysis');
    const resultsDiv = document.getElementById('results');

    if (!query) return updateStatus("⚠ INPUT REQUIRED.", true);

    aiBox.style.display = "none";
    resultsDiv.innerHTML = "";
    let contextStr = "";
    let searchSuccess = false;

    try {
      const tRes = await fetch("https://api.tavily.com/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ api_key: TAVILY_KEY, query: query, search_depth: "basic" })
      });
      if (!tRes.ok) throw new Error();
      const tData = await tRes.json();
      if (tData.results && tData.results.length > 0) {
        searchSuccess = true;
        tData.results.slice(0, 5).forEach(item => {
          contextStr += `${item.title}: ${item.content} `;
          resultsDiv.innerHTML += `<div class="result-item"><a href="${item.url}" target="_blank" style="color:#fff; font-weight:bold; text-decoration:none;">${item.title}</a><div style="color:#bbb; font-size:0.9rem; margin-top:5px;">${item.content}</div></div>`;
        });
      }
    } catch (e) { 
      console.warn("WAIT FOR A MIN");
    }

    if (!searchSuccess) {
      for (let i = 0; i < SERPER_KEYS.length; i++) {
        try {
          const sRes = await fetch("https://google.serper.dev/search", {
            method: "POST",
            headers: { "X-API-KEY": SERPER_KEYS[i], "Content-Type": "application/json" },
            body: JSON.stringify({ q: query, num: 5 })
          });
          if (!sRes.ok) throw new Error();
          const sData = await sRes.json();
          if (sData.organic && sData.organic.length > 0) {
            searchSuccess = true;
            sData.organic.forEach(item => {
              contextStr += `${item.title}: ${item.snippet} `;
              resultsDiv.innerHTML += `<div class="result-item"><a href="${item.link}" target="_blank" style="color:#fff; font-weight:bold; text-decoration:none;">${item.title}</a><div style="color:#bbb; font-size:0.9rem; margin-top:5px;">${item.snippet}</div></div>`;
            });
            break;
          }
        } catch (e) { 
          console.warn(`Node ${i+1} Exhausted.`);
          continue; 
        }
      }
    }

    try {
      updateStatus(searchSuccess ? "SYNTHESIZING DATA..." : " AI MODE ENABELLED");
      const prompt = searchSuccess 
        ? `Use context: "${contextStr}" to give 3 technical points for: ${query}`
        : `All web search nodes are offline. Provide 3 technical points for: ${query}.`;

      const aiRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "llama-3.1-8b-instant",
          messages: [{ role: "user", content: prompt }]
        })
      });

      const aiData = await aiRes.json();
      aiBox.style.display = "block";
      aiBox.innerHTML = `<strong>NEURAL CONCLUSIONS:</strong><br>${aiData.choices[0].message.content.replace(/\n/g, '<br>')}`;
      updateStatus(searchSuccess ? "HYBRID UPLINK STABLE." : "GROQ-ONLY MODE STABLE.");
    } catch (err) {
      updateStatus("SERVER DOWN", true);
    }
  }
</script>

</body>
</html>
